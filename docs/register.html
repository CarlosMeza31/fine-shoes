<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fine Shoes — Crear cuenta</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar__logo">Fine Shoes</a>
</nav>

<div class="form-card" style="max-width:500px">
  <h1 class="form-card__title">Crear cuenta</h1>
  <p class="form-card__sub">Únete y empieza a comprar</p>

  <form id="register-form" novalidate>
    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input type="text" id="name" placeholder="Juan Pérez" required minlength="2">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" placeholder="tu@email.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="8">
    </div>
    <div class="form-group">
      <label class="form-label">Teléfono <span style="color:var(--gray)">(opcional)</span></label>
      <input type="tel" id="phone" placeholder="+52 000 000 0000">
    </div>
    <div class="form-group">
      <label class="form-label">Dirección <span style="color:var(--gray)">(opcional)</span></label>
      <input type="text" id="address" placeholder="Calle, Colonia, Ciudad">
    </div>

    <p class="form-error" id="global-err" style="margin-bottom:.75rem"></p>

    <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn">
      Crear cuenta
    </button>
  </form>

  <div class="form-divider">o</div>
  <p style="text-align:center;font-size:.88rem;color:var(--gray)">
    ¿Ya tienes cuenta?
    <a href="login.html" style="color:var(--gold)">Inicia sesión</a>
  </p>
</div>

<script type="module">
  import { auth, setToken, setUser, isLoggedIn } from './js/api.js';
  if (isLoggedIn()) window.location.href = 'index.html';

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('global-err');
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Creando cuenta...';

    try {
      const res = await auth.register({
        name:     document.getElementById('name').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
        phone:    document.getElementById('phone').value || null,
        address:  document.getElementById('address').value || null,
      });
      setToken(res.access_token);
      setUser(res.user);
      window.location.href = 'index.html';
    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'Crear cuenta';
    }
  });
</script>
</body>
</html>
